<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0f0f1e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="description" content="Controle des radiateurs Heatzy">
  <title>Heatzy</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icons/icon-192.png" type="image/png">
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
  <link rel="stylesheet" href="css/style.css?v=9">
</head>
<body>
  <div id="progress-bar" class="progress-bar" hidden><div class="progress-fill"></div></div>

  <!-- Login -->
  <div id="login-screen" class="screen">
    <div class="login-card">
      <div class="login-icon">🔥</div>
      <h1>Heatzy</h1>
      <p class="login-sub">Controlez vos radiateurs</p>
      <form id="login-form">
        <input type="email" id="email" autocomplete="email" required placeholder="Email">
        <input type="password" id="password" autocomplete="current-password" required placeholder="Mot de passe">
        <button type="submit" class="btn-login" id="login-btn">Se connecter</button>
        <p id="login-error" class="error-msg" hidden></p>
      </form>
    </div>
  </div>

  <!-- Simple mode -->
  <div id="simple-screen" class="screen" hidden>
    <div class="simple-container">
      <div class="simple-header">
        <span class="simple-title">🔥 Heatzy</span>
        <button class="simple-toggle-mode" id="simple-to-advanced">Mode avance</button>
      </div>
      <div class="simple-buttons">
        <button class="simple-btn simple-home" id="simple-home">
          <span class="simple-icon">🏠</span>
          <span class="simple-label">Je rentre</span>
          <span class="simple-desc">Activer le chauffage</span>
        </button>
        <button class="simple-btn simple-leave" id="simple-leave">
          <span class="simple-icon">🧳</span>
          <span class="simple-label">Je pars</span>
          <span class="simple-desc">Tout eteindre</span>
        </button>
      </div>
      <div id="simple-status" class="simple-status"></div>
    </div>
  </div>

  <!-- Dashboard (advanced) -->
  <div id="dashboard-screen" class="screen" hidden>
    <header class="topbar">
      <span class="topbar-title">🔥 Heatzy</span>
      <div class="topbar-actions">
        <span id="last-update" class="last-update"></span>
        <button class="icon-btn" id="simple-mode-btn" title="Mode simple">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        </button>
        <button class="icon-btn" id="refresh-btn" title="Actualiser">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
        </button>
        <button class="icon-btn" id="logout-btn" title="Deconnexion">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        </button>
      </div>
    </header>

    <!-- Scenarios -->
    <div class="scenarios">
      <button class="scene-btn scene-leave" id="scene-leave">🧳 Je pars</button>
      <button class="scene-btn scene-home" id="scene-home">🏠 Je rentre</button>
      <button class="scene-btn scene-night" id="scene-night">🌙 Mode nuit</button>
      <button class="icon-btn" id="config-btn" title="Configurer exclusions">⚙️</button>
    </div>

    <!-- Offline alert -->
    <div id="offline-alert" class="offline-alert" hidden></div>

    <!-- Quick actions -->
    <div class="quick-actions">
      <div class="qa-row">
        <button class="qa-btn qa-cft" data-mode="cft">🔥 Confort</button>
        <button class="qa-btn qa-eco" data-mode="eco">🌙 Nuit</button>
        <button class="qa-btn qa-fro" data-mode="fro">❄️ Hors-gel</button>
        <button class="qa-btn qa-stop" data-mode="stop">⭕ Off</button>
      </div>
      <div class="qa-row">
        <button class="qa-btn qa-prog-on" id="programme-on-btn">📅 Prog ON</button>
        <button class="qa-btn qa-prog-off" id="programme-off-btn">📅 Prog OFF</button>
      </div>
    </div>

    <div id="devices" class="devices"></div>

    <div id="loading" class="loading" hidden>
      <div class="spinner"></div>
    </div>
  </div>

  <!-- Config modal -->
  <div id="config-modal" class="modal-bg" hidden>
    <div class="modal">
      <h3>⚙️ Exclusions</h3>
      <p class="config-desc">Les appareils exclus ne seront PAS affectes par les actions globales (Confort, Nuit, Hors-gel, Prog ON, Je rentre, Mode nuit).<br>Off et Prog OFF s'appliquent toujours a tous.</p>
      <div id="config-list" class="config-list"></div>
      <div class="modal-footer">
        <button class="btn-cancel" id="config-cancel">Fermer</button>
      </div>
    </div>
  </div>

  <!-- Boost modal -->
  <div id="boost-modal" class="modal-bg" hidden>
    <div class="modal">
      <h3>⚡ Boost</h3>
      <div class="boost-grid">
        <button class="boost-btn" data-hours="1">1h</button>
        <button class="boost-btn" data-hours="2">2h</button>
        <button class="boost-btn" data-hours="4">4h</button>
        <button class="boost-btn" data-hours="8">8h</button>
        <button class="boost-btn" data-hours="12">12h</button>
        <button class="boost-btn" data-hours="24">24h</button>
      </div>
      <div class="boost-custom">
        <input type="number" id="boost-hours" value="2" min="1" max="72" step="1">
        <span>heures</span>
        <button class="btn-go" id="boost-confirm">Go</button>
      </div>
      <button class="btn-cancel" id="boost-cancel">Annuler</button>
    </div>
  </div>

  <div id="toast" class="toast" hidden></div>

  <script src="js/app.js?v=9"></script>
</body>
</html>
