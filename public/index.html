<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#e94560">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="description" content="Contrôle des radiateurs Heatzy">
  <title>Heatzy Web</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icons/icon-192.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icons/icon-192.svg">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Login -->
  <div id="login-screen" class="screen">
    <div class="login-card">
      <div class="login-icon">🔥</div>
      <h1>Heatzy Web</h1>
      <p class="login-subtitle">Connectez-vous avec votre compte Heatzy</p>
      <form id="login-form">
        <div class="field">
          <label for="email">Email</label>
          <input type="email" id="email" autocomplete="email" required>
        </div>
        <div class="field">
          <label for="password">Mot de passe</label>
          <input type="password" id="password" autocomplete="current-password" required>
        </div>
        <button type="submit" class="btn btn-primary btn-full" id="login-btn">
          Se connecter
        </button>
        <p id="login-error" class="error-msg" hidden></p>
      </form>
    </div>
  </div>

  <!-- Dashboard -->
  <div id="dashboard-screen" class="screen" hidden>
    <header class="app-header">
      <h1>Heatzy</h1>
      <div class="header-actions">
        <button class="btn-icon" id="refresh-btn" title="Actualiser">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
        </button>
        <button class="btn-icon" id="logout-btn" title="Déconnexion">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        </button>
      </div>
    </header>

    <!-- Vacation banner -->
    <div class="vacation-bar">
      <button class="btn btn-vacation" id="vacation-btn">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-3-3.87"/><path d="M7 21v-2a4 4 0 0 1 3-3.87"/><circle cx="12" cy="7" r="4"/><line x1="2" y1="2" x2="22" y2="22" stroke="#ffd93d" stroke-width="2.5"/></svg>
        Mode Vacances — Tout couper
      </button>
      <button class="btn btn-back" id="cancel-vacation-btn" hidden>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        Annuler vacances
      </button>
    </div>

    <!-- Quick mode bar -->
    <div class="quick-bar">
      <span class="quick-label">Tout passer en :</span>
      <div class="quick-buttons">
        <button class="btn btn-mode btn-cft" data-mode="cft">Confort</button>
        <button class="btn btn-mode btn-eco" data-mode="eco">Eco</button>
        <button class="btn btn-mode btn-fro" data-mode="fro">Hors-gel</button>
        <button class="btn btn-mode btn-stop" data-mode="stop">Off</button>
      </div>
    </div>

    <!-- Device list -->
    <div id="devices" class="device-grid"></div>

    <!-- Loading -->
    <div id="loading" class="loading" hidden>
      <div class="spinner"></div>
    </div>
  </div>

  <!-- Vacation modal -->
  <div id="vacation-modal" class="modal-overlay" hidden>
    <div class="modal">
      <h2>Mode Vacances</h2>
      <p>Tous les radiateurs passeront en mode hors-gel pendant la durée choisie.</p>
      <div class="field">
        <label for="vacation-days">Durée (jours)</label>
        <input type="number" id="vacation-days" value="7" min="1" max="99">
      </div>
      <div class="modal-actions">
        <button class="btn btn-secondary" id="vacation-cancel">Annuler</button>
        <button class="btn btn-primary" id="vacation-confirm">Activer</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="toast" hidden></div>

  <script src="js/app.js"></script>
</body>
</html>
